    <div class="modal fade" id="addMemberModal" tabindex="-1" aria-labelledby="addMemberModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="addMemberModalLabel">회원 추가</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="addMemberForm">
              <div class="row">
                <!-- 이름 -->
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold" for="addMemberName">이름 <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="addMemberName" required placeholder="회원 이름">
                </div>
                <!-- 역할 -->
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold" for="addMemberRole">역할</label>
                  <select class="form-select" id="addMemberRole">
                    <option value="회원" selected>회원</option>
                    <option value="청년회장">청년회장</option>
                    <option value="총무">총무</option>
                  </select>
                </div>
                <!-- 카테고리 -->
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold" for="addMemberCategory">카테고리 <span class="text-danger">*</span></label>
                  <select class="form-select" id="addMemberCategory" required>
                    <option value="leadership">지도부</option>
                    <option value="construction">건설/건축</option>
                    <option value="electric">전기/설비</option>
                    <option value="equipment">장비/렌탈</option>
                    <option value="service" selected>서비스/유통</option>
                    <option value="finance">금융</option>
                    <option value="it">IT</option>
                  </select>
                </div>
                <!-- 회사명 -->
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold" for="addMemberCompany">회사명</label>
                  <input type="text" class="form-control" id="addMemberCompany" placeholder="회사/소속명">
                </div>
                <!-- 업종/분야 -->
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold" for="addMemberField">업종/분야</label>
                  <input type="text" class="form-control" id="addMemberField" placeholder="업종 또는 분야">
                </div>
                <!-- 직책 -->
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold" for="addMemberPosition">직책</label>
                  <input type="text" class="form-control" id="addMemberPosition" placeholder="CEO, CTO, 직장인 등">
                </div>
                <!-- 전화번호 -->
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold" for="addMemberPhone">전화번호</label>
                  <input type="tel" class="form-control" id="addMemberPhone" placeholder="010-0000-0000">
                </div>
                <!-- 출생연도 -->
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold" for="addMemberBirth">출생연도</label>
                  <input type="text" class="form-control" id="addMemberBirth" placeholder="1980">
                </div>
                <!-- 주소 -->
                <div class="col-12 mb-3">
                  <label class="form-label fw-bold" for="addMemberAddress">직장 주소</label>
                  <input type="text" class="form-control" id="addMemberAddress" placeholder="주소 입력">
                </div>
                <!-- 한줄소개 -->
                <div class="col-12 mb-3">
                  <label class="form-label fw-bold" for="addMemberTitle">한줄소개</label>
                  <input type="text" class="form-control" id="addMemberTitle" placeholder="예: 현 OO회 회장">
                </div>
                <!-- 프로필 사진 -->
                <div class="col-12 mb-3">
                  <label class="form-label fw-bold" for="addMemberImage">프로필 사진</label>
                  <input type="file" class="form-control" id="addMemberImage" accept="image/*">
                  <div id="imagePreview" class="mt-2"></div>
                </div>
                <!-- 관리 비밀번호 -->
                <div class="col-12 mb-3">
                  <label class="form-label fw-bold" for="addMemberPassword">관리 비밀번호 <span class="text-danger">*</span></label>
                  <input type="password" class="form-control" id="addMemberPassword" required placeholder="관리 비밀번호 입력">
                </div>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">회원 등록</button>
              </div>
            </form>
          </div>
        </div>
